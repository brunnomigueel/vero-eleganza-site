<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo | Vero Eleganza</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #0A0A0A;
      --bg-card: #111111;
      --bg-hover: #1A1A1A;
      --gold: #C9A24D;
      --gold-hover: #DBC075;
      --text-main: #FFFFFF;
      --text-muted: #888888;
      --border: rgba(201, 162, 77, 0.15);
      --danger: #ef4444;
      --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
    }

    /* --- LOGIN SCREEN --- */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-box {
      background: var(--bg-card);
      padding: 40px;
      border-radius: 8px;
      border: 1px solid var(--border);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-box img { max-width: 200px; margin-bottom: 30px; }
    .login-box h2 { font-size: 18px; margin-bottom: 20px; font-weight: 400; color: var(--gold); }
    
    /* --- DASHBOARD LAYOUT --- */
    #dashboard {
      display: none;
      height: 100vh;
      grid-template-columns: 260px 1fr;
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    
    .sidebar-logo {
      padding: 0 24px 30px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .sidebar-logo img { max-width: 60px; }

    .nav-item {
      padding: 12px 24px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-item:hover { color: var(--text-main); background: var(--bg-hover); }
    .nav-item.active { color: var(--gold); background: rgba(201, 162, 77, 0.05); border-right: 3px solid var(--gold); }
    .nav-item.logout { margin-top: auto; color: var(--danger); }

    /* Main Content */
    .main-content {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Topbar */
    .topbar {
      height: 70px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      background: var(--bg-dark);
    }

    .topbar-actions { display: flex; gap: 10px; }

    /* Content Area */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
    }
    .section-view { display: none; }
    .section-view.active { display: block; }
    
    .section-title { font-size: 24px; font-weight: 500; margin-bottom: 24px; color: var(--gold); }

    /* --- COMPONENTS --- */
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    
    input[type="text"], input[type="number"], input[type="password"], select, textarea {
      width: 100%;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--gold); }
    
    .btn {
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: none;
      transition: all 0.2s;
    }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-gold:hover { background: var(--gold-hover); }
    .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
    .btn-outline:hover { background: rgba(201, 162, 77, 0.1); }
    .btn-danger { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: white; }

    /* Config Panel */
    .config-panel { background: var(--bg-card); padding: 30px; border-radius: 8px; border: 1px solid var(--border); max-width: 600px; }

    /* Products List */
    .product-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 30px; }
    
    .product-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 20px;
      align-items: start;
    }
    
    .product-row-image {
      width: 80px;
      height: 100px;
      background: var(--bg-dark);
      border: 1px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    .product-row-image img { width: 100%; height: 100%; object-fit: cover; }
    .product-row-image:hover::after {
      content: 'Trocar';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .product-row-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .full-col { grid-column: 1 / -1; }
    
    .product-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    
    /* Toggle Switch */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--bg-dark); border: 1px solid var(--border); transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: var(--text-muted); transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: rgba(201, 162, 77, 0.2); border-color: var(--gold); }
    input:checked + .slider:before { transform: translateX(20px); background-color: var(--gold); }
    .switch-wrap { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--gold);
      color: #000;
      padding: 12px 24px;
      border-radius: 4px;
      font-weight: 600;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 9999;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    
    /* Category row style */
    .category-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-box">
      <img src="logo-v.png?v=2" alt="Vero Eleganza">
      <h2>Acesso Administrativo</h2>
      <form id="login-form">
        <div class="form-group">
          <input type="password" id="login-pwd" placeholder="Digite a senha" required>
        </div>
        <button type="submit" class="btn btn-gold" style="width: 100%">Entrar</button>
        <p id="login-error" style="color: var(--danger); font-size: 12px; margin-top: 10px; display: none;">Senha incorreta</p>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-logo">
        <img src="logo-v.png?v=2" alt="Vero Eleganza">
      </div>
      <div class="nav-item active" data-target="config">Configurações Gerais</div>
      <div class="nav-item" data-target="manage-categories">Gerenciar Categorias</div>
      
      <div id="dynamic-nav-items">
         <!-- Nav items injected here -->
      </div>
      
      <div class="nav-item logout" id="btn-logout" style="margin-top: 30px;">
        Sair
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Topbar -->
      <div class="topbar">
        <div>Painel de Controle</div>
        <div class="topbar-actions">
          <a href="index.html" target="_blank" class="btn btn-outline">Ver Site</a>
          <button class="btn btn-gold" id="btn-save-all">Salvar Tudo</button>
        </div>
      </div>

      <!-- Content Area -->
      <div class="content-area">
        
        <!-- View: Configurações -->
        <div id="view-config" class="section-view active">
          <h2 class="section-title">Configurações Gerais</h2>
          <div class="config-panel">
            <div class="form-group">
              <label>Número do WhatsApp (apenas números, com código do país)</label>
              <input type="text" id="cfg-whatsapp" placeholder="Ex: 5551999999999">
            </div>
            <div class="form-group">
              <label>Link do Instagram</label>
              <input type="text" id="cfg-instagram" placeholder="https://instagram.com/vero.eleganza">
            </div>
            <div class="form-group">
              <label>Nova Senha do Admin (Deixe em branco para não alterar)</label>
              <input type="password" id="cfg-password" placeholder="Nova senha">
            </div>
          </div>
        </div>
        
        <!-- View: Gerenciar Categorias -->
        <div id="view-manage-categories" class="section-view">
          <h2 class="section-title">Gerenciar Categorias</h2>
          <div class="config-panel" style="margin-bottom: 20px;">
            <div class="form-group">
              <label>ID da Categoria (sem espaços, minúsculo, ex: sapatos)</label>
              <input type="text" id="new-cat-id" placeholder="ID da categoria">
            </div>
            <div class="form-group">
              <label>Nome da Categoria (Ex: Sapatos de Couro)</label>
              <input type="text" id="new-cat-name" placeholder="Nome da categoria">
            </div>
            <button class="btn btn-gold" id="btn-add-category">Adicionar Nova Categoria</button>
          </div>
          <div id="category-list-manager" class="product-list">
            <!-- Categorias listadas aqui -->
          </div>
        </div>

        <div id="dynamic-category-views">
          <!-- Views de Produtos das categorias injetadas aqui -->
        </div>

      </div>
    </div>
  </div>

  <div id="toast">Alterações salvas!</div>

  <!-- JAVASCRIPT MODULE (FIREBASE) -->
  <script type="module">
    import { db, doc, getDoc, setDoc } from './firebase.js';

    // Default structure for new app data
    let appData = {
      config: {
        whatsappNumber: '5551999999999',
        instagramUrl: 'https://www.instagram.com/vero.eleganza/'
      },
      categories: [
        { id: 'ternos', name: 'Ternos' },
        { id: 'camisas', name: 'Camisas' },
        { id: 'sueteres', name: 'Suéteres' },
        { id: 'gravatas', name: 'Gravatas' }
      ],
      products: {
        ternos: [], camisas: [], sueteres: [], gravatas: []
      }
    };

    // Helper functions for global scope (needed because modules are isolated)
    window.handleImageUpload = function(event, id) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('img-prev-' + id).src = e.target.result;
          document.getElementById('img-prev-' + id).dataset.base64 = e.target.result;
        }
        reader.readAsDataURL(file);
      }
    };

    window.removeProduct = function(category, id) {
      if (confirm('Tem certeza que deseja excluir este produto?')) {
        appData.products[category] = appData.products[category].filter(p => p.id !== id);
        const row = document.getElementById('row-' + id);
        if (row) row.remove();
      }
    };

    window.removeCategory = function(catId) {
      if (confirm('Atenção: Ao excluir a categoria, todos os produtos dela serão apagados. Tem certeza?')) {
        appData.categories = appData.categories.filter(c => c.id !== catId);
        delete appData.products[catId];
        renderApp();
      }
    };

    window.addProduct = function(category) {
      if (!appData.products[category]) {
        appData.products[category] = [];
      }
      const id = Date.now().toString();
      const newProduct = {
        id: id,
        name: 'Novo Produto',
        price: 0.00,
        link: '',
        badge: '',
        image: 'assets/images/hero-bg.jpg',
        active: true
      };
      appData.products[category].push(newProduct);
      document.getElementById('list-' + category).appendChild(createProductRow(category, newProduct));
    };

    // --- LOGIN LOGIC ---
    const pwdHash = localStorage.getItem('veroEleganza_adminPwd') || btoa('vero2026');
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const input = document.getElementById('login-pwd').value;
      if (btoa(input) === pwdHash) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'grid';
        loadFirebaseData();
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
      location.reload();
    });

    async function loadFirebaseData() {
      try {
        const getDocPromise = getDoc(doc(db, "vero_eleganza", "store_data"));
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout Firebase")), 4000));
        
        const storeDoc = await Promise.race([getDocPromise, timeoutPromise]);
        
        if (storeDoc.exists()) {
          const data = storeDoc.data();
          if (data.config) appData.config = data.config;
          if (data.categories) appData.categories = data.categories;
          if (data.products) appData.products = data.products;
        } else {
          throw new Error("Documento vazio");
        }
      } catch(err) {
        console.warn("Erro ou timeout no Firebase, usando cache local:", err);
        const localProducts = JSON.parse(localStorage.getItem('veroEleganza_products'));
        const localConfig = JSON.parse(localStorage.getItem('veroEleganza_config'));
        if (localProducts) appData.products = localProducts;
        if (localConfig) appData.config = localConfig;
        alert("Aviso: Conexão com Firebase falhou. O painel foi carregado offline. (Verifique as regras do Firebase Firestore e clique em 'Salvar Tudo' para tentar reenviar)");
      }
      renderApp();
    }

    // --- RENDER APP ---
    function renderApp() {
      // Basic Configs
      document.getElementById('cfg-whatsapp').value = appData.config.whatsappNumber || '';
      document.getElementById('cfg-instagram').value = appData.config.instagramUrl || '';

      // Category Manager Tab
      const catListManager = document.getElementById('category-list-manager');
      catListManager.innerHTML = '';
      appData.categories.forEach(cat => {
        catListManager.insertAdjacentHTML('beforeend', `
          <div class="category-row">
             <div><strong>${cat.name}</strong> <span style="color:var(--text-muted);font-size:12px;">(ID: ${cat.id})</span></div>
             <button class="btn btn-danger" onclick="removeCategory('${cat.id}')">Excluir</button>
          </div>
        `);
      });

      // Clear dynamic Nav Items and Views
      const dynamicNav = document.getElementById('dynamic-nav-items');
      const dynamicViews = document.getElementById('dynamic-category-views');
      dynamicNav.innerHTML = '';
      dynamicViews.innerHTML = '';

      appData.categories.forEach(cat => {
        // Nav Item
        const navItem = document.createElement('div');
        navItem.className = 'nav-item';
        navItem.dataset.target = `cat-${cat.id}`;
        navItem.innerText = cat.name;
        dynamicNav.appendChild(navItem);

        // Section View
        const viewDiv = document.createElement('div');
        viewDiv.id = `view-cat-${cat.id}`;
        viewDiv.className = 'section-view';
        viewDiv.innerHTML = `
          <h2 class="section-title">${cat.name}</h2>
          <div class="product-list" id="list-${cat.id}"></div>
          <button class="btn btn-outline" onclick="addProduct('${cat.id}')">+ Adicionar Produto</button>
        `;
        dynamicViews.appendChild(viewDiv);

        // Render Products inside View
        const pList = viewDiv.querySelector(`#list-${cat.id}`);
        const prods = appData.products[cat.id] || [];
        prods.forEach(p => {
          pList.appendChild(createProductRow(cat.id, p));
        });
      });

      // Reattach nav events
      document.querySelectorAll('.nav-item').forEach(item => {
        if (item.classList.contains('logout')) return;
        item.addEventListener('click', () => {
          document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
          document.querySelectorAll('.section-view').forEach(s => s.classList.remove('active'));
          
          item.classList.add('active');
          const targetView = document.getElementById('view-' + item.dataset.target);
          if (targetView) targetView.classList.add('active');
        });
      });
    }

    function createProductRow(category, product) {
      const div = document.createElement('div');
      div.className = 'product-row';
      div.id = `row-${product.id}`;
      
      const badgeOptions = ['Nenhum', 'Destaque', 'Novo', 'Premium', 'Inverno', 'Clássica', 'Essencial', 'Elegante']
        .map(b => `<option value="${b==='Nenhum'?'':b}" ${product.badge===b?'selected':''}>${b}</option>`).join('');

      const imgSrc = product.image ? product.image : 'assets/images/hero-bg.jpg';

      div.innerHTML = `
        <div class="product-row-image" onclick="document.getElementById('img-upload-${product.id}').click()">
          <img src="${imgSrc}" id="img-prev-${product.id}">
          <input type="file" id="img-upload-${product.id}" style="display:none" accept="image/*" onchange="handleImageUpload(event, '${product.id}')">
        </div>
        <div class="product-row-form">
          <div class="form-group full-col" style="margin:0">
            <label>Nome do Produto</label>
            <input type="text" value="${product.name}" id="name-${product.id}">
          </div>
          <div class="form-group" style="margin:0">
            <label>Preço (R$)</label>
            <input type="number" step="0.01" value="${product.price}" id="price-${product.id}">
          </div>
          <div class="form-group" style="margin:0">
            <label>Selo (Badge)</label>
            <select id="badge-${product.id}">
              ${badgeOptions}
            </select>
          </div>
          <div class="form-group full-col" style="margin:0">
            <label>Link Botão "Finalizar Compra" (Vazio = WhatsApp)</label>
            <input type="text" value="${product.link}" id="link-${product.id}" placeholder="https://checkout.com/...">
          </div>
          <div class="full-col product-actions">
            <label class="switch-wrap">
              <label class="switch">
                <input type="checkbox" id="active-${product.id}" ${product.active ? 'checked' : ''}>
                <span class="slider"></span>
              </label>
              Produto Ativo no Site
            </label>
            <button class="btn btn-danger" onclick="removeProduct('${category}', '${product.id}')">Excluir</button>
          </div>
        </div>
      `;
      return div;
    }

    // --- ADD CATEGORY ---
    document.getElementById('btn-add-category').addEventListener('click', () => {
      const idInput = document.getElementById('new-cat-id');
      const nameInput = document.getElementById('new-cat-name');
      const catId = idInput.value.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
      const catName = nameInput.value.trim();

      if (!catId || !catName) {
        alert("Preencha o ID e o Nome da Categoria.");
        return;
      }
      if (appData.categories.some(c => c.id === catId)) {
        alert("Já existe uma categoria com este ID.");
        return;
      }

      appData.categories.push({ id: catId, name: catName });
      appData.products[catId] = [];
      
      idInput.value = '';
      nameInput.value = '';
      
      renderApp();
      showToast('Categoria adicionada! Lembre de salvar.');
    });

    // --- SAVE ---
    document.getElementById('btn-save-all').addEventListener('click', async () => {
      const saveBtn = document.getElementById('btn-save-all');
      saveBtn.innerText = "Salvando...";
      saveBtn.disabled = true;

      try {
        // Config
        appData.config.whatsappNumber = document.getElementById('cfg-whatsapp').value;
        appData.config.instagramUrl = document.getElementById('cfg-instagram').value;
        
        const newPwd = document.getElementById('cfg-password').value;
        if (newPwd) {
          localStorage.setItem('veroEleganza_adminPwd', btoa(newPwd));
          document.getElementById('cfg-password').value = '';
        }

        // Gather Products from UI
        appData.categories.forEach(cat => {
          const catProds = appData.products[cat.id] || [];
          catProds.forEach(p => {
            if(document.getElementById('row-' + p.id)) {
              p.name = document.getElementById('name-' + p.id).value;
              p.price = parseFloat(document.getElementById('price-' + p.id).value);
              p.badge = document.getElementById('badge-' + p.id).value;
              p.link = document.getElementById('link-' + p.id).value;
              p.active = document.getElementById('active-' + p.id).checked;
              
              const imgEl = document.getElementById('img-prev-' + p.id);
              if (imgEl.dataset.base64) {
                p.image = imgEl.dataset.base64;
              }
            }
          });
        });

        // Salva backup no localStorage caso firebase falhe
        localStorage.setItem('veroEleganza_config', JSON.stringify(appData.config));
        localStorage.setItem('veroEleganza_products', JSON.stringify(appData.products));

        // Push to Firebase with timeout
        const setDocPromise = setDoc(doc(db, "vero_eleganza", "store_data"), {
           config: appData.config,
           categories: appData.categories,
           products: appData.products
        });
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout Firebase")), 5000));
        
        await Promise.race([setDocPromise, timeoutPromise]);

        showToast('Tudo salvo no Firebase!');
      } catch (e) {
        console.error("Erro ao salvar:", e);
        alert("Erro ao salvar no banco de dados.");
      } finally {
        saveBtn.innerText = "Salvar Tudo";
        saveBtn.disabled = false;
      }
    });

    function showToast(msg = 'Alterações salvas!') {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

  </script>
</body>
</html>
